<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Java Haven</title>

  <style>
    
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background-color: #f5f1e6; 
      color: #3e2723; 
    }

    h1, h2 {
      margin: 0;
    }

   
    body {
      display: grid;
      grid-template-areas:
        "header"
        "nav"
        "main"
        "footer";
      grid-template-rows: auto auto 1fr auto;
      min-height: 100vh;
    }

    .header {
      grid-area: header;
      background-color: #4e342e; 
      color: white;
      text-align: center;
      padding: 30px 20px;
    }

    .nav {
      grid-area: nav;
      background-color: #6d4c41;
      padding: 10px 0;
    }

    .nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 0;
      margin: 0;
    }

    .nav a {
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .nav a:hover {
      text-decoration: underline;
    }

    .main-content {
      grid-area: main;
      padding: 40px 20px;
      text-align: center;
    }

    .flex-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .flex-item {
      background-color: #d7ccc8;
      padding: 20px 40px;
      border-radius: 8px;
      font-weight: bold;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    }

    .footer {
      grid-area: footer;
      background-color: #4e342e;
      color: white;
      text-align: center;
      padding: 15px;
    }

    
    @media (min-width: 768px) {
      body {
        grid-template-areas:
          "header header"
          "nav nav"
          "main main"
          "footer footer";
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <h1>Java Haven</h1>
    <p>Your daily dose of caffeine and comfort.</p>
  </header>
  
  <nav class="nav">
    <ul>
      <li><a href="#menu">Menu</a></li>
      <li><a href="#about">About Us</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
  
  <main class="main-content">
    <h2>Featured Coffees</h2>
    <div class="flex-container">
      <div class="flex-item">Espresso</div>
      <div class="flex-item">Cappuccino</div>
      <div class="flex-item">Latte</div>
      <div class="flex-item">Mocha</div>
    </div>
  </main>
  

</body>
</html>

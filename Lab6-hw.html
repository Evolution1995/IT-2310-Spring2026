<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Box Model Lab</title>

<style>
/* Add your CSS here */

body {
    font-family: Arial, sans-serif;
}

.box {
    border: 5px solid blue;        /* 5px solid blue border */
    padding: 20px;                 /* 20px padding */
    margin: 20px;                  /* 20px margin */
    background-color: lightblue;   /* Background color */
    width: 250px;                  /* Experiment width */
    height: 120px;                 /* Experiment height */
    box-sizing: border-box;        /* Includes padding & border in width/height */
}
</style>

</head>
<body>

<h1>CSS Box Model Lab</h1>

<div class="box">
    <p>This is a demonstration of the CSS Box Model.</p>
</div>

<!-- Second box to show margin spacing -->
<div class="box">
    <p>This is another box to demonstrate margin spacing.</p>
</div>

</body>
</html>
